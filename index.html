<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NgawurCinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap');
        
        body { background-color: #020202; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .font-netflix { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
        
        /* Splash hanya muncul jika belum ada session */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* Welcome Popup */
        #welcome-popup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 11000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        .text-blue-nc { color: #0066ff; }
        .bg-blue-nc { background-color: #0066ff; }
        .blue-glow { text-shadow: 0 0 20px rgba(0,102,255,0.6); }

        .movie-card { 
            transition: all 0.3s ease; 
            cursor: pointer; background: #111; border-radius: 8px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }
        .movie-card:hover { transform: scale(1.05); border-color: #0066ff; z-index: 50; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        #detail-page, #video-overlay, #search-page { display: none; }
        #video-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; }
        
        .hero-slide { transition: opacity 1s ease-in-out; }
    </style>
</head>
<body>

    <div id="splash">
        <div id="splash-1" class="text-center transition-all duration-1000">
            <h1 class="font-netflix text-7xl md:text-9xl text-blue-nc blue-glow italic">NgawurCinema</h1>
        </div>
        <div id="splash-2" class="text-center mt-12 opacity-0 transition-all duration-1000 absolute flex flex-col items-center">
            <p class="text-[9px] tracking-[0.6em] text-zinc-500 mb-6 font-bold uppercase">DATA POWERED BY</p>
            <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_1-5bdc75aaebeb75dc7ae79426ddd9be3b2be1e342510f8202baf6bffa71d7f5c4.svg" class="w-12 md:w-16 opacity-80">
        </div>
    </div>

    <div id="welcome-popup">
        <div class="bg-zinc-900 p-8 md:p-12 rounded-2xl border border-blue-nc/30 text-center max-w-lg mx-4 shadow-[0_0_50px_rgba(0,102,255,0.2)]">
            <h2 class="font-netflix text-4xl text-blue-nc mb-4 italic">Halo & Selamat Menonton!</h2>
            <div class="space-y-1 text-zinc-400 text-sm mb-8 font-bold uppercase tracking-widest">
                <p>Akbar Aridani Setiawan</p>
                <p>Fairus Rasidin</p>
                <p>Firdy Ridho Fillah</p>
                <p>Faeyza Ardellein Yaradhitya</p>
                <p>Malfaluna Rahmah</p>
            </div>
            <button onclick="closeWelcome()" class="bg-blue-nc px-12 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:scale-105 transition">Masuk Gallery</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-[1000] px-8 py-4 flex justify-between items-center bg-gradient-to-b from-black via-black/80 to-transparent backdrop-blur-md">
        <div class="flex items-center gap-10">
            <h1 onclick="location.reload()" class="font-netflix text-4xl text-blue-nc cursor-pointer blue-glow italic">NgawurCinema</h1>
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-400">
                <button onclick="location.reload()" class="hover:text-blue-nc transition">Home</button>
                <button onclick="executeSearch('trending')" class="hover:text-blue-nc transition">Movies</button>
            </div>
        </div>
        
        <div class="flex items-center gap-6 w-1/3 justify-end">
            <div class="relative w-full">
                <input type="text" id="search-input" onkeyup="handleSearchInput(event)" placeholder="Cari film..." class="w-full bg-zinc-900/50 border border-zinc-800 py-2 px-10 rounded text-xs focus:border-blue-nc outline-none text-white">
            </div>
            <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_1-5bdc75aaebeb75dc7ae79426ddd9be3b2be1e342510f8202baf6bffa71d7f5c4.svg" class="w-8">
        </div>
    </nav>

    <div id="home-page" class="opacity-0 transition-opacity duration-1000">
        <header id="hero-slider" class="h-[85vh] relative flex items-center px-12 overflow-hidden">
            <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 scale-105"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-[#020202] via-[#020202]/40 to-transparent"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#020202] via-transparent"></div>
            <div class="relative z-10 max-w-3xl">
                <h2 id="hero-title" class="font-netflix text-6xl md:text-8xl mb-6 uppercase italic leading-[0.9] opacity-0 transition-all duration-700 translate-y-10">...</h2>
                <p id="hero-desc" class="text-zinc-300 text-lg line-clamp-3 mb-10 max-w-xl opacity-0 transition-all duration-700 translate-y-10 delay-100"></p>
                <div class="opacity-0 transition-all duration-700 translate-y-10 delay-200">
                    <button id="hero-btn" class="bg-blue-nc px-10 py-3 rounded font-bold text-xs uppercase tracking-widest hover:scale-105 transition">Tonton Sekarang</button>
                </div>
            </div>
        </header>

        <main class="px-12 -mt-20 relative z-20 pb-20">
            <h3 class="font-netflix text-2xl mb-8 tracking-widest text-blue-nc italic uppercase">Trending Hari Ini</h3>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-6 gap-6"></div>
        </main>
    </div>

    <div id="detail-page">
        <section class="min-h-screen relative flex items-center px-6 md:px-16 py-32 overflow-hidden">
            <div id="detail-backdrop" class="absolute inset-0 bg-cover bg-center opacity-30"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
            <div class="absolute right-10 md:right-40 top-1/2 -translate-y-1/2 z-50">
                <button onclick="openPlayer()" class="w-32 h-32 md:w-48 md:h-48 bg-blue-nc rounded-full flex items-center justify-center shadow-[0_0_100px_rgba(0,102,255,0.4)] hover:scale-110 transition group">
                    <span class="text-6xl ml-4 text-white group-hover:animate-pulse">▶</span>
                </button>
            </div>
            <div class="relative z-10 max-w-4xl">
                <h1 id="detail-title" class="font-netflix text-6xl md:text-9xl mb-8 uppercase italic leading-[0.85]">...</h1>
                <div class="flex gap-4 mb-10">
                    <button onclick="openTrailerPop()" class="bg-white text-black px-10 py-3 rounded font-bold text-xs uppercase hover:bg-zinc-200 transition">▷ Trailer</button>
                </div>
                <div class="flex flex-wrap items-center gap-6 text-[13px] font-bold mb-10 text-zinc-300 uppercase">
                    <span id="detail-year" class="bg-zinc-800 px-3 py-1 rounded">...</span>
                    <span id="detail-runtime" class="text-blue-nc">...</span>
                    <span class="text-yellow-500">★ <span id="detail-vote">...</span></span>
                </div>
                <p id="detail-desc" class="text-zinc-400 text-lg leading-relaxed max-w-2xl"></p>
                <div id="cast-list" class="flex gap-8 overflow-x-auto mt-12 hide-scroll pb-4"></div>
            </div>
        </section>

        <section class="px-12 py-20 bg-black">
            <h3 class="font-netflix text-2xl mb-8 tracking-widest text-blue-nc italic uppercase">Film Terkait</h3>
            <div id="recommend-grid" class="grid grid-cols-2 md:grid-cols-6 gap-6"></div>
        </section>

        <footer class="p-12 border-t border-white/5 bg-zinc-950 flex flex-col items-center">
             <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_1-5bdc75aaebeb75dc7ae79426ddd9be3b2be1e342510f8202baf6bffa71d7f5c4.svg" class="w-10 mb-4">
             <p class="text-[9px] text-zinc-600 text-center tracking-widest font-bold uppercase">Official 111Movies Engine Integration</p>
        </footer>
    </div>

    <div id="search-page" class="pt-32 px-12 pb-20">
        <h3 id="search-title" class="font-netflix text-3xl mb-12 text-blue-nc italic uppercase border-l-4 border-blue-nc pl-4">Hasil Pencarian</h3>
        <div id="search-grid" class="grid grid-cols-2 md:grid-cols-6 gap-6"></div>
    </div>

    <div id="video-overlay">
        <div class="h-16 flex justify-between items-center px-8 bg-black border-b border-white/10">
            <span id="player-movie-title" class="font-netflix text-2xl text-blue-nc italic">...</span>
            <button onclick="closePlayer()" class="bg-red-600 px-8 py-2 rounded text-[10px] font-bold uppercase">Tutup</button>
        </div>
        <div class="flex-1 bg-black">
            <iframe id="main-iframe" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <script>
        const API_KEY = '4691c1d87e79a0a7af5eb27a98ee2dce';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        const ORI_URL = 'https://image.tmdb.org/t/p/original';

        let currentMovie = null;
        let trendingMovies = [];
        let heroIndex = 0;

        window.onload = () => {
            const hasSeenSplash = sessionStorage.getItem('seenSplash');
            
            if (!hasSeenSplash) {
                const splash = document.getElementById('splash');
                splash.style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('splash-1').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash-2').style.opacity = '1';
                        setTimeout(() => {
                            splash.style.opacity = '0';
                            setTimeout(() => {
                                splash.style.display = 'none';
                                showWelcome();
                                sessionStorage.setItem('seenSplash', 'true');
                            }, 800);
                        }, 1200);
                    }, 400);
                }, 1000);
            } else {
                showWelcome();
            }
            getTrending();
        };

        function showWelcome() {
            const hasSeenWelcome = sessionStorage.getItem('seenWelcome');
            if (!hasSeenWelcome) {
                document.getElementById('welcome-popup').style.display = 'flex';
            } else {
                document.getElementById('home-page').style.opacity = '1';
            }
        }

        function closeWelcome() {
            document.getElementById('welcome-popup').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-popup').style.display = 'none';
                document.getElementById('home-page').style.opacity = '1';
                sessionStorage.setItem('seenWelcome', 'true');
            }, 500);
        }

        async function getTrending() {
            const res = await fetch(`${BASE_URL}/trending/movie/day?api_key=${API_KEY}&language=id-ID`);
            const data = await res.json();
            trendingMovies = data.results;
            renderMovies(trendingMovies, 'movie-grid');
            startHeroSlider();
        }

        function startHeroSlider() {
            updateHero();
            setInterval(() => {
                heroIndex = (heroIndex + 1) % 5; // Slide top 5 movies
                updateHero();
            }, 6000);
        }

        function updateHero() {
            const m = trendingMovies[heroIndex];
            const title = document.getElementById('hero-title');
            const desc = document.getElementById('hero-desc');
            const bg = document.getElementById('hero-bg');
            const btn = document.getElementById('hero-btn');

            title.style.opacity = '0'; desc.style.opacity = '0';
            
            setTimeout(() => {
                bg.style.backgroundImage = `url('${ORI_URL + m.backdrop_path}')`;
                title.innerText = m.title;
                desc.innerText = m.overview;
                btn.onclick = () => openMovie(m.id);
                
                title.style.opacity = '1'; title.style.transform = 'translateY(0)';
                desc.style.opacity = '1'; desc.style.transform = 'translateY(0)';
            }, 700);
        }

        async function openMovie(id) {
            const res = await fetch(`${BASE_URL}/movie/${id}?api_key=${API_KEY}&language=id-ID&append_to_response=credits,recommendations,videos`);
            currentMovie = await res.json();
            
            document.getElementById('detail-backdrop').style.backgroundImage = `url('${ORI_URL + currentMovie.backdrop_path}')`;
            document.getElementById('detail-title').innerText = currentMovie.title;
            document.getElementById('detail-year').innerText = currentMovie.release_date.split('-')[0];
            document.getElementById('detail-runtime').innerText = currentMovie.runtime + " MIN";
            document.getElementById('detail-vote').innerText = currentMovie.vote_average.toFixed(1);
            document.getElementById('detail-desc').innerText = currentMovie.overview || "No description.";
            
            // Render Rekomendasi
            renderMovies(currentMovie.recommendations.results.slice(0, 12), 'recommend-grid');

            document.getElementById('home-page').style.display = 'none';
            document.getElementById('search-page').style.display = 'none';
            document.getElementById('detail-page').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function renderMovies(movies, targetId) {
            const target = document.getElementById(targetId);
            target.innerHTML = '';
            movies.forEach(m => {
                if(!m.poster_path) return;
                const card = document.createElement('div');
                card.className = "movie-card";
                card.innerHTML = `<img src="${IMG_URL + m.poster_path}" class="w-full aspect-[2/3] object-cover"><div class="p-3"><h4 class="text-[10px] font-bold uppercase truncate italic">${m.title}</h4></div>`;
                card.onclick = () => openMovie(m.id);
                target.appendChild(card);
            });
        }

        function openPlayer() {
            document.getElementById('player-movie-title').innerText = currentMovie.title;
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('main-iframe').src = `https://111movies.net/movie/${currentMovie.id}`;
        }

        function closePlayer() { document.getElementById('video-overlay').style.display = 'none'; document.getElementById('main-iframe').src = ''; }
        
        async function executeSearch(q) {
            const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${q}&language=id-ID`);
            const data = await res.json();
            renderMovies(data.results, 'search-grid');
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('detail-page').style.display = 'none';
            document.getElementById('search-page').style.display = 'block';
        }
    </script>
</body>
</html>
